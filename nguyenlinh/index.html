<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Heart</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Fullscreen 3D Heart Canvas -->
    <canvas id="heart-canvas"></canvas>

    <!-- Text Overlay inside the Heart -->
    <div class="heart-text-container">
        <div id="heart-text">Nguyễn Linh</div>
    </div>

    <!-- Ambient Glowing Overlay Background -->
    <div class="ambient-glow"></div>

    <!-- Three.js Library CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Custom Page Script -->
    <script src="script.js"></script>
</body>

</html>
